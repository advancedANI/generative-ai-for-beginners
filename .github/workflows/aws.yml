const archonService = new ArchonGenesisService();
const queryClient = new QueryClient();

// =================================================================
// ⚛️ CUSTOM HOOKS (with React Query): จัดการ Logic การดึงข้อมูล
// =================================================================
const useSystemData = () => {
    const { setModels, addLog } = useArchonStore();

    return useQuery({
        queryKey: ['system-initialization'],
        queryFn: async () => {
            addLog({ message: 'Initializing system...', level: 'info' });
            const models = await archonService.getAIModels();
            addLog({ message: 'System core components loaded.', level: 'info' });
            return models;
        },
        onSuccess: setModels,
        onError: (error) => {
            addLog({ message: `System initialization failed: ${error}`, level: 'error' });
        },
        staleTime: Infinity,
    });
};

const useCreateAndAnalyzeProject = () => {
    const { addProject, updateProject, addLog } = useArchonStore();

    return useMutation({
        mutationFn: async (details: { name: string, modelId: string }) => {
            addLog({ message: `Creating project: ${details.name}`, level: 'info' });
            const newProject = await archonService.createAIProject({
                name: details.name,
                aiModelId: details.modelId,
            });

            addProject(newProject);
            addLog({ message: `Project ${newProject.id} created, starting analysis.`, level: 'info' });

            const insights = await archonService.performAdvancedAnalysis(newProject.id);

            return { ...newProject, status: 'completed' as ProjectStatus, insights };
        },
        onSuccess: (completedProject) => {
            updateProject(completedProject);
            addLog({ message: `Analysis complete for ${completedProject.id}.`, level: 'info' });
        },
        onError: (error) => {
            addLog({ message: `Project creation failed: ${error}`, level: 'error' });
        }
    });
};

